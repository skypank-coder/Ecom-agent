<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcomAgent - AI Powered Product Importer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 3rem;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1.2rem;
            color: #b0b0b0;
            margin-top: 10px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #ffffff;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }

        input::placeholder {
            color: #b0b0b0;
        }

        .import-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .import-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .import-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            display: none;
            text-align: center;
            margin-top: 30px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 1.1rem;
            color: #ffffff;
        }

        .result {
            display: none;
            text-align: center;
            margin-top: 30px;
        }

        .product-image {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .product-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .product-price {
            font-size: 1.2rem;
            color: #4ade80;
            margin-bottom: 20px;
        }

        .shopify-btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(45deg, #95a5a6 0%, #7f8c8d 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s ease;
        }

        .shopify-btn:hover {
            transform: translateY(-2px);
        }

        .error {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            text-align: center;
        }

        .retry-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .card {
                padding: 30px 20px;
            }

            .logo {
                font-size: 2.5rem;
            }

            .tagline {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🤖 EcomAgent</div>
        <div class="tagline">Import any product to your Shopify store in seconds</div>
    </div>

    <div class="card" id="formCard">
        <form id="importForm">
            <div class="form-group">
                <label for="supplier_url">Supplier Product URL</label>
                <input type="url" id="supplier_url" name="supplier_url" placeholder="https://any-supplier.com/product/..." required>
            </div>

            <div class="form-group">
                <label for="shopify_store_url">Your Shopify Store URL</label>
                <input type="text" id="shopify_store_url" name="shopify_store_url" placeholder="your-store.myshopify.com" required>
            </div>

            <div class="form-group">
                <label for="shopify_access_token">Shopify Access Token</label>
                <input type="password" id="shopify_access_token" name="shopify_access_token" placeholder="shpat_xxxxxxxxxxxxxxxxx" required>
            </div>

            <button type="submit" class="import-btn" id="importBtn">Import Product</button>
        </form>
    </div>

    <div class="status" id="status">
        <div class="spinner"></div>
        <div class="status-text" id="statusText">Agent is working...</div>
    </div>

    <div class="result" id="result">
        <img id="productImage" class="product-image" src="" alt="Product Image">
        <div class="product-name" id="productName"></div>
        <div class="product-price" id="productPrice"></div>
        <a id="shopifyLink" class="shopify-btn" href="#" target="_blank">View on Shopify</a>
    </div>

    <div class="error" id="error">
        <div id="errorText"></div>
        <button class="retry-btn" onclick="retry()">Retry</button>
    </div>

    <script>
        const formCard = document.getElementById('formCard');
        const statusDiv = document.getElementById('status');
        const resultDiv = document.getElementById('result');
        const errorDiv = document.getElementById('error');
        const importBtn = document.getElementById('importBtn');
        const statusText = document.getElementById('statusText');

        const progressMessages = [
            "Scraping supplier page...",
            "Extracting product data...",
            "Publishing to Shopify..."
        ];

        document.getElementById('importForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const supplierUrl = document.getElementById('supplier_url').value;
            const shopifyStoreUrl = document.getElementById('shopify_store_url').value;
            const shopifyAccessToken = document.getElementById('shopify_access_token').value;

            if (!supplierUrl || !shopifyStoreUrl || !shopifyAccessToken) {
                showError("Please fill in all fields");
                return;
            }

            hideAll();
            statusDiv.style.display = 'block';
            importBtn.disabled = true;

            // Start polling for status updates
            const statusInterval = setInterval(async () => {
                try {
                    const statusResponse = await fetch('/status');
                    const statusData = await statusResponse.json();
                    if (statusData.message) {
                        statusText.textContent = statusData.message;
                    }
                } catch (error) {
                    console.log('Status polling error:', error);
                }
            }, 2000);

            try {
                const response = await fetch('/import-product', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        supplier_url: supplierUrl,
                        shopify_store_url: shopifyStoreUrl,
                        shopify_access_token: shopifyAccessToken
                    })
                });

                clearInterval(statusInterval);

                const result = await response.json();

                if (result.success) {
                    document.getElementById('productImage').src = result.image_url || '';
                    document.getElementById('productName').textContent = result.product_name;
                    document.getElementById('productPrice').textContent = result.price;
                    document.getElementById('shopifyLink').href = result.shopify_url;
                    hideAll();
                    resultDiv.style.display = 'block';
                } else {
                    showError(result.error);
                }
            } catch (error) {
                clearInterval(statusInterval);
                showError("Network error: " + error.message);
            } finally {
                importBtn.disabled = false;
            }
        });

        function hideAll() {
            formCard.style.display = 'none';
            statusDiv.style.display = 'none';
            resultDiv.style.display = 'none';
            errorDiv.style.display = 'none';
        }

        function showError(message) {
            hideAll();
            document.getElementById('errorText').textContent = message;
            errorDiv.style.display = 'block';
        }

        function retry() {
            hideAll();
            formCard.style.display = 'block';
        }
    </script>
</body>
</html>
