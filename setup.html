<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcomAgent - Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 3rem;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1.2rem;
            color: #b0b0b0;
            margin-top: 10px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #ffffff;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }

        input::placeholder {
            color: #b0b0b0;
        }

        .save-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .save-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .save-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .success {
            display: none;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            color: #22c55e;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            text-align: center;
        }

        .error {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .card {
                padding: 30px 20px;
            }

            .logo {
                font-size: 2.5rem;
            }

            .tagline {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🤖 EcomAgent</div>
        <div class="tagline">Setup your Shopify credentials (one-time only)</div>
    </div>

    <div class="card" id="setupCard">
        <form id="setupForm">
            <div class="form-group">
                <label for="shopify_store_url">Your Shopify Store URL</label>
                <input type="text" id="shopify_store_url" name="shopify_store_url" placeholder="your-store.myshopify.com" required>
            </div>

            <div class="form-group">
                <label for="shopify_access_token">Shopify Access Token</label>
                <input type="password" id="shopify_access_token" name="shopify_access_token" placeholder="shpat_xxxxxxxxxxxxxxxxx" required>
            </div>

            <button type="submit" class="save-btn" id="saveBtn">Save Credentials</button>
        </form>
    </div>

    <div class="success" id="success">
        <div>✅ Credentials saved successfully!</div>
        <div style="margin-top: 10px;">Redirecting to dashboard...</div>
    </div>

    <div class="error" id="error">
        <div id="errorText"></div>
    </div>

    <script>
        document.getElementById('setupForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const shopifyStoreUrl = document.getElementById('shopify_store_url').value;
            const shopifyAccessToken = document.getElementById('shopify_access_token').value;

            if (!shopifyStoreUrl || !shopifyAccessToken) {
                showError("Please fill in all fields");
                return;
            }

            hideAll();
            document.getElementById('saveBtn').disabled = true;

            try {
                const response = await fetch('/save-credentials', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        shopify_store_url: shopifyStoreUrl,
                        shopify_access_token: shopifyAccessToken
                    })
                });

                const result = await response.json();

                if (result.success) {
                    document.getElementById('success').style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 2000);
                } else {
                    showError(result.error);
                }
            } catch (error) {
                showError("Network error: " + error.message);
            } finally {
                document.getElementById('saveBtn').disabled = false;
            }
        });

        function hideAll() {
            document.getElementById('setupCard').style.display = 'none';
            document.getElementById('success').style.display = 'none';
            document.getElementById('error').style.display = 'none';
        }

        function showError(message) {
            hideAll();
            document.getElementById('errorText').textContent = message;
            document.getElementById('error').style.display = 'block';
        }
    </script>
</body>
</html>
